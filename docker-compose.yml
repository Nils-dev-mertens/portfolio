services:
  web:
    build: .
    restart: unless-stopped
    environment:
      - DB_PATH=/data/portfolio.db
      - HOST=0.0.0.0
      - PORT=4321
    volumes:
      - db-data:/data
    expose:
      - "4321"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web

volumes:
  db-data:
